<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyanPace Admin - Add Venue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgMain: '#f3f4f5',
                        bgSurface: '#d6d6d5',
                        textMuted: '#949492',
                        brandPrimary: '#1d2846',
                        inputBg: '#fcfcfc',
                    },
                    fontFamily: { sans: ['Jost', 'sans-serif'] },
                    boxShadow: {
                        'soft': '0 10px 40px -10px rgba(29,40,70,0.08)',
                        'modal': '0 25px 50px -12px rgba(29,40,70,0.25), 0 0 0 1px rgba(29,40,70,0.05)',
                        'input': '0 2px 4px rgba(0,0,0,0.02) inset',
                    },
                    animation: {
                        'modal-enter': 'modalEnter 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                        'backdrop-enter': 'backdropEnter 0.3s ease-out forwards',
                    },
                    keyframes: {
                        modalEnter: {
                            '0%': { opacity: '0', transform: 'translateY(30px) scale(0.95)' },
                            '100%': { opacity: '1', transform: 'translateY(0) scale(1)' }
                        },
                        backdropEnter: {
                            '0%': { opacity: '0', backdropFilter: 'blur(0px)' },
                            '100%': { opacity: '1', backdropFilter: 'blur(8px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Jost', sans-serif; background-color: #f3f4f5; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23949492' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1.25rem center;
            background-size: 1.2em;
        }

        .drop-zone-active {
            border-color: #1d2846;
            background-color: rgba(29, 40, 70, 0.02);
            transform: scale(0.99);
        }
        
        input, select, textarea {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="p-6 lg:p-8 antialiased text-brandPrimary min-h-screen flex flex-col items-center justify-center relative">

    <button onclick="openModal()" class="inline-flex items-center gap-3 px-8 py-4 rounded-[1.25rem] bg-brandPrimary text-white text-sm font-bold shadow-soft hover:shadow-lg hover:-translate-y-0.5 transition-all duration-300 active:scale-95 group">
        <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center group-hover:bg-white/30 transition-colors">
            <i data-lucide="plus" class="w-3.5 h-3.5"></i>
        </div>
        Register New Venue
    </button>

    <div id="addShopModal" class="fixed inset-0 z-50 hidden flex-col items-center justify-center sm:p-6 lg:p-12 overflow-hidden pointer-events-none">
        <div id="modalBackdrop" class="absolute inset-0 bg-brandPrimary/30 opacity-0 transition-all duration-300" onclick="closeModal()"></div>
        
        <div class="bg-white w-full h-full sm:h-auto sm:max-h-full sm:max-w-3xl sm:rounded-[2rem] shadow-modal flex flex-col relative overflow-hidden opacity-0 pointer-events-auto transition-all duration-400 ease-[cubic-bezier(0.16,1,0.3,1)] transform translate-y-8 scale-95" id="modalContainer">
            
            <div class="px-8 py-6 sm:px-10 sm:py-8 border-b border-bgSurface/40 flex items-center justify-between shrink-0 bg-white z-20 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brandPrimary/80 to-brandPrimary/20"></div>
                <div class="flex items-center gap-5">
                    <div class="w-12 h-12 rounded-2xl bg-bgMain border border-bgSurface/60 flex items-center justify-center text-brandPrimary shadow-sm relative overflow-hidden group">
                        <div class="absolute inset-0 bg-brandPrimary/5 transform translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                        <i data-lucide="building-2" class="w-6 h-6 relative z-10"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-brandPrimary tracking-tight leading-none mb-1.5">New Venue Registration</h2>
                        <p class="text-xs font-medium text-textMuted">Complete the form below to onboard a new partner.</p>
                    </div>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 flex items-center justify-center rounded-xl hover:bg-bgMain text-textMuted hover:text-brandPrimary transition-colors active:scale-95 border border-transparent hover:border-bgSurface/60 bg-white shadow-sm">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto hide-scrollbar bg-white">
                <form id="shopForm" onsubmit="handleSubmit(event)" class="p-8 sm:p-10 flex flex-col gap-8">
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-7">
                        
                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label for="shopName" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Official Venue Name</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="store" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <input type="text" id="shopName" required placeholder="Enter the registered name of the business" class="w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-4 text-sm font-semibold text-brandPrimary placeholder:text-textMuted/50 focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label for="brandSelect" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Brand Affiliation</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                                    <i data-lucide="tag" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <select id="brandSelect" required class="custom-select w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-10 text-sm font-semibold text-brandPrimary focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input">
                                    <option value="" disabled selected class="font-normal">Select affiliation...</option>
                                    <option value="independent">Independent Entity</option>
                                    <option value="myanpace_partner">MyanPace Official Partner</option>
                                    <option value="premium_group">Premium Dining Group</option>
                                    <option value="street_collective">Street Food Collective</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label for="categorySelect" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Primary Category</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                                    <i data-lucide="layout-grid" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <select id="categorySelect" required class="custom-select w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-10 text-sm font-semibold text-brandPrimary focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input">
                                    <option value="" disabled selected class="font-normal">Select category...</option>
                                    <option value="restaurant">Restaurant & Fine Dining</option>
                                    <option value="cafe">Cafe & Bakery</option>
                                    <option value="streetfood">Street Food & Stalls</option>
                                    <option value="bbq">BBQ & Grill</option>
                                    <option value="bar">Bar & Lounge</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label for="location" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Geographic Location</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="map-pin" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <input type="text" id="location" required placeholder="e.g., Downtown Yangon, Bahan" class="w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-4 text-sm font-semibold text-brandPrimary placeholder:text-textMuted/50 focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input">
                            </div>
                        </div>

                        <div class="flex flex-col gap-2">
                            <label for="priceRange" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Price Classification</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none z-10">
                                    <i data-lucide="banknote" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <select id="priceRange" required class="custom-select w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-10 text-sm font-semibold text-brandPrimary focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input">
                                    <option value="" disabled selected class="font-normal">Select classification...</option>
                                    <option value="$">$ (Budget Friendly)</option>
                                    <option value="$$">$$ (Moderate)</option>
                                    <option value="$$$">$$$ (Premium)</option>
                                    <option value="$$$$">$$$$ (Luxury / Fine Dining)</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label for="password" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Access Credential</label>
                            <div class="relative group">
                                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <i data-lucide="key-round" class="w-4 h-4 text-textMuted group-focus-within:text-brandPrimary transition-colors"></i>
                                </div>
                                <input type="password" id="password" required placeholder="Assign an password" class="w-full bg-inputBg border border-bgSurface/80 rounded-xl py-3.5 pl-11 pr-12 text-sm font-mono font-bold text-brandPrimary placeholder:text-textMuted/50 focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input tracking-widest">
                                <button type="button" onclick="togglePassword()" class="absolute right-2 top-1/2 -translate-y-1/2 w-9 h-9 flex items-center justify-center text-textMuted hover:text-brandPrimary hover:bg-bgMain rounded-lg transition-colors focus:outline-none">
                                    <i data-lucide="eye" id="eyeIcon" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex flex-col gap-2 md:col-span-2">
                            <label for="description" class="text-[10px] font-bold text-textMuted uppercase tracking-[0.15em] ml-1">Venue Overview</label>
                            <textarea id="description" rows="3" placeholder="Provide a comprehensive description of the venue, ambiance, and specialty offerings..." class="w-full bg-inputBg border border-bgSurface/80 rounded-xl p-4 text-sm font-semibold text-brandPrimary placeholder:text-textMuted/50 focus:bg-white focus:outline-none focus:border-brandPrimary/50 focus:ring-4 focus:ring-brandPrimary/5 shadow-input resize-none leading-relaxed"></textarea>
                        </div>

                        <div class="flex flex-col gap-3 md:col-span-2 mt-2">
                            <div class="flex items-center justify-between ml-1">
                                <label class="text-[10px] font-bold text-brandPrimary uppercase tracking-[0.15em]">Primary Asset</label>
                                <span class="text-[10px] font-bold text-textMuted tracking-wider">JPG, PNG <span class="mx-1">•</span> MAX 5MB</span>
                            </div>
                            
                            <div id="dropZone" onclick="document.getElementById('fileInput').click()" ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)" class="w-full border-2 border-dashed border-bgSurface/80 rounded-[1.5rem] bg-inputBg p-8 flex flex-col items-center justify-center gap-4 cursor-pointer hover:bg-white hover:border-brandPrimary/40 transition-all duration-300 group relative overflow-hidden min-h-[180px]">
                                
                                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg" class="hidden" onchange="handleFileSelect(event)">
                                
                                <div id="uploadPrompt" class="flex flex-col items-center gap-3 pointer-events-none transition-all duration-300 transform group-hover:-translate-y-1">
                                    <div class="w-12 h-12 rounded-full bg-bgMain border border-bgSurface/60 shadow-sm flex items-center justify-center text-textMuted group-hover:text-brandPrimary group-hover:shadow-md transition-all duration-300 group-hover:bg-white">
                                        <i data-lucide="image-plus" class="w-5 h-5"></i>
                                    </div>
                                    <div class="text-center">
                                        <p class="text-sm font-bold text-brandPrimary">Click to browse or drag image here</p>
                                        <p class="text-xs font-medium text-textMuted mt-1">High resolution facade or menu feature</p>
                                    </div>
                                </div>

                                <div id="imagePreviewContainer" class="absolute inset-0 w-full h-full bg-white hidden items-center justify-center p-2 z-10">
                                    <div class="w-full h-full rounded-[1.25rem] overflow-hidden border border-bgSurface/50 relative group/preview shadow-sm">
                                        <img id="previewImage" src="" class="w-full h-full object-cover">
                                        <div class="absolute inset-0 bg-brandPrimary/40 backdrop-blur-[2px] opacity-0 group-hover/preview:opacity-100 transition-opacity duration-300 flex items-center justify-center gap-4">
                                            <button type="button" onclick="changeImage(event)" class="flex flex-col items-center gap-2 p-3 text-white hover:scale-105 transition-transform">
                                                <div class="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center backdrop-blur-md border border-white/30">
                                                    <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                                                </div>
                                                <span class="text-[10px] font-bold uppercase tracking-wider">Change</span>
                                            </button>
                                            <button type="button" onclick="removeImage(event)" class="flex flex-col items-center gap-2 p-3 text-white hover:scale-105 transition-transform">
                                                <div class="w-10 h-10 rounded-full bg-red-500/80 flex items-center justify-center backdrop-blur-md border border-red-500/50">
                                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                                </div>
                                                <span class="text-[10px] font-bold uppercase tracking-wider">Remove</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                            </div>
                        </div>

                    </div>
                </form>
            </div>

            <div class="px-8 py-5 sm:px-10 sm:py-6 border-t border-bgSurface/40 bg-bgMain/20 flex items-center justify-between shrink-0 z-20">
                <p class="text-[10px] font-bold text-textMuted uppercase tracking-widest hidden sm:block">MyanPace Admin System</p>
                <div class="flex items-center gap-3 sm:gap-4 w-full sm:w-auto justify-end">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl bg-white border border-bgSurface text-brandPrimary text-sm font-bold hover:bg-bgMain transition-colors shadow-sm active:scale-95 flex-1 sm:flex-none">
                        Cancel
                    </button>
                    <button type="button" onclick="document.getElementById('shopForm').requestSubmit()" class="inline-flex items-center justify-center gap-2.5 px-8 py-3 rounded-xl bg-brandPrimary text-white text-sm font-bold shadow-soft hover:shadow-lg hover:-translate-y-0.5 transition-all active:scale-95 flex-1 sm:flex-none">
                        <i data-lucide="check" class="w-4 h-4"></i>
                        Save Venue
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-brandPrimary text-white px-6 py-4 rounded-xl text-sm font-bold shadow-[0_20px_40px_-10px_rgba(29,40,70,0.4)] z-[100] transition-all duration-400 transform translate-y-24 opacity-0 flex items-center gap-3 border border-white/10 min-w-[300px] justify-center">
        <div id="toastIconContainer" class="w-6 h-6 rounded-full bg-green-500/20 flex items-center justify-center shrink-0">
            <i data-lucide="check" id="toastIcon" class="w-3.5 h-3.5 text-green-400"></i>
        </div>
        <span id="toastMsg" class="tracking-wide">Venue registered successfully.</span>
    </div>

    <script>
        lucide.createIcons();

        const modal = document.getElementById('addShopModal');
        const modalBackdrop = document.getElementById('modalBackdrop');
        const modalContainer = document.getElementById('modalContainer');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const previewContainer = document.getElementById('imagePreviewContainer');
        const previewImage = document.getElementById('previewImage');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');
        
        let currentFile = null;

        function openModal() {
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            
            setTimeout(() => {
                modal.classList.add('pointer-events-auto');
                modalBackdrop.classList.add('backdrop-blur-sm', 'opacity-100');
                modalBackdrop.classList.remove('opacity-0');
                
                modalContainer.classList.remove('opacity-0', 'translate-y-8', 'scale-95');
                modalContainer.classList.add('opacity-100', 'translate-y-0', 'scale-100');
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('pointer-events-auto');
            modalBackdrop.classList.remove('backdrop-blur-sm', 'opacity-100');
            modalBackdrop.classList.add('opacity-0');
            
            modalContainer.classList.add('opacity-0', 'translate-y-8', 'scale-95');
            modalContainer.classList.remove('opacity-100', 'translate-y-0', 'scale-100');
            
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                document.getElementById('shopForm').reset();
                removeImage(new Event('click'));
                document.body.style.overflow = '';
            }, 400);
        }

        function togglePassword() {
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                eyeIcon.setAttribute('data-lucide', 'eye-off');
            } else {
                passwordInput.type = 'password';
                eyeIcon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.add('drop-zone-active');
        }

        function handleDragLeave(e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drop-zone-active');
        }

        function handleDrop(e) {
            e.preventDefault();
            e.stopPropagation();
            dropZone.classList.remove('drop-zone-active');
            
            const dt = e.dataTransfer;
            const files = dt.files;

            if (files && files.length > 0) {
                processFile(files[0]);
            }
        }

        function handleFileSelect(e) {
            const files = e.target.files;
            if (files && files.length > 0) {
                processFile(files[0]);
            }
        }

        function processFile(file) {
            if (!file.type.startsWith('image/')) {
                showToast('Please upload a valid image file.', true);
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showToast('Image size exceeds 5MB limit.', true);
                return;
            }

            currentFile = file;
            const reader = new FileReader();
            
            reader.onload = function(e) {
                previewImage.src = e.target.result;
                uploadPrompt.classList.add('opacity-0', 'scale-95');
                setTimeout(() => {
                    uploadPrompt.classList.add('hidden');
                    previewContainer.classList.remove('hidden');
                    previewContainer.classList.add('flex');
                    setTimeout(() => previewContainer.classList.add('opacity-100'), 10);
                }, 150);
            }
            
            reader.readAsDataURL(file);
        }

        function removeImage(e) {
            if(e) e.stopPropagation();
            currentFile = null;
            fileInput.value = '';
            previewImage.src = '';
            previewContainer.classList.remove('opacity-100');
            setTimeout(() => {
                previewContainer.classList.add('hidden');
                previewContainer.classList.remove('flex');
                uploadPrompt.classList.remove('hidden');
                setTimeout(() => uploadPrompt.classList.remove('opacity-0', 'scale-95'), 10);
            }, 150);
        }

        function changeImage(e) {
            e.stopPropagation();
            fileInput.click();
        }

        function handleSubmit(e) {
            e.preventDefault();
            
            if (!currentFile) {
                showToast('Primary asset image is required.', true);
                dropZone.classList.add('border-red-400', 'bg-red-50/50');
                setTimeout(() => dropZone.classList.remove('border-red-400', 'bg-red-50/50'), 2000);
                return;
            }

            const submitBtn = e.target.querySelector('button[type="submit"]') || document.querySelector('#modalContainer .bg-brandPrimary');
            const originalHtml = submitBtn.innerHTML;
            
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Processing...';
            submitBtn.disabled = true;
            lucide.createIcons();

            setTimeout(() => {
                submitBtn.innerHTML = originalHtml;
                submitBtn.disabled = false;
                lucide.createIcons();
                
                closeModal();
                showToast('Venue successfully registered.', false);
            }, 1000);
        }

        function showToast(message, isError) {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toastMsg');
            const iconEl = document.getElementById('toastIcon');
            const iconContainer = document.getElementById('toastIconContainer');
            
            msgEl.innerText = message;
            
            if (isError) {
                toast.classList.remove('border-white/10');
                toast.classList.add('border-red-500/50');
                iconEl.setAttribute('data-lucide', 'alert-triangle');
                iconEl.classList.remove('text-green-400');
                iconEl.classList.add('text-red-400');
                iconContainer.classList.remove('bg-green-500/20');
                iconContainer.classList.add('bg-red-500/20');
            } else {
                toast.classList.add('border-white/10');
                toast.classList.remove('border-red-500/50');
                iconEl.setAttribute('data-lucide', 'check');
                iconEl.classList.add('text-green-400');
                iconEl.classList.remove('text-red-400');
                iconContainer.classList.add('bg-green-500/20');
                iconContainer.classList.remove('bg-red-500/20');
            }
            lucide.createIcons();

            toast.classList.remove('translate-y-24', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-y-24', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }
    </script>
</body>
</html>
