<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyanPace - Foodie Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bgMain: '#f3f4f5',
                        bgSurface: '#d6d6d5',
                        textMuted: '#949492',
                        brandPrimary: '#1d2846',
                    },
                    fontFamily: { sans: ['Jost', 'sans-serif'] },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'pop-in': 'popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'shake': 'shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' }
                        },
                        popIn: {
                            '0%': { opacity: '0', transform: 'scale(0.9) translateY(10px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' }
                        },
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #f3f4f5; font-family: 'Jost', sans-serif; }
        .option-btn { transition: all 0.2s ease; }
        .option-btn:disabled { cursor: not-allowed; }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen p-4">

    <div id="quizContainer" class="bg-white w-full max-w-md rounded-3xl shadow-xl border border-bgSurface overflow-hidden relative min-h-[400px] flex flex-col animate-pop-in">
        
        <div class="h-2 w-full bg-bgMain relative overflow-hidden shrink-0">
            <div id="progressBar" class="absolute top-0 left-0 h-full bg-brandPrimary transition-all duration-300 w-0"></div>
        </div>

        <div id="startScreen" class="flex flex-col items-center justify-center flex-1 p-8 text-center animate-fade-in">
            <div class="w-20 h-20 bg-bgMain rounded-full flex items-center justify-center text-brandPrimary shadow-sm border border-bgSurface mb-6">
                <i class="fa-solid fa-utensils text-3xl"></i>
            </div>
            <h2 class="text-2xl font-bold text-brandPrimary mb-3 tracking-tight">The Foodie Challenge</h2>
            <p class="text-sm text-textMuted font-medium mb-8 leading-relaxed">Test your culinary knowledge of Yangon's vibrant food scene. 3 quick questions. Are you ready?</p>
            <button onclick="startQuiz()" class="w-full bg-brandPrimary text-white py-3.5 rounded-xl font-bold hover:opacity-90 transition-opacity shadow-md">
                Start Quiz
            </button>
        </div>

        <div id="quizScreen" class="hidden flex-col flex-1 p-6 sm:p-8 relative animate-fade-in">
            <div class="flex justify-between items-center mb-6 shrink-0">
                <span id="questionCount" class="text-xs font-bold text-textMuted uppercase tracking-widest">Question 1 of 3</span>
                <span class="text-xs font-bold text-brandPrimary bg-bgMain px-3 py-1 rounded-full border border-bgSurface">Foodie Trivia</span>
            </div>
            
            <h3 id="questionText" class="text-xl font-bold text-brandPrimary mb-6 leading-snug"></h3>
            
            <div id="optionsContainer" class="flex flex-col gap-3 flex-1"></div>
            
            <div id="feedbackContainer" class="h-10 mt-6 flex items-center justify-center opacity-0 transition-opacity duration-300 shrink-0">
                <p id="feedbackText" class="text-sm font-bold flex items-center gap-2"></p>
            </div>
        </div>

        <div id="resultScreen" class="hidden flex-col items-center justify-center flex-1 p-8 text-center animate-fade-in">
            <div id="resultIcon" class="w-24 h-24 rounded-full flex items-center justify-center text-4xl text-white shadow-lg mb-6"></div>
            <h2 id="resultTitle" class="text-3xl font-bold text-brandPrimary mb-2 tracking-tight"></h2>
            <p id="resultDesc" class="text-base text-textMuted font-medium mb-8 leading-relaxed"></p>
            
            <div class="bg-bgMain w-full p-4 rounded-2xl border border-bgSurface mb-8 flex justify-center items-center gap-4">
                <div class="text-center">
                    <p class="text-[10px] font-bold text-textMuted uppercase tracking-widest mb-1">Score</p>
                    <p id="finalScore" class="text-2xl font-bold text-brandPrimary"></p>
                </div>
            </div>

            <button onclick="resetQuiz()" class="w-full bg-brandPrimary text-white py-3.5 rounded-xl font-bold hover:opacity-90 transition-opacity shadow-md">
                Play Again
            </button>
        </div>

    </div>

    <script>
        const quizData = [
            {
                question: "What is the primary base ingredient for a traditional authentic Mohinga broth?",
                options: ["Chicken", "Catfish", "Pork", "Beef"],
                correctIndex: 1,
                explanation: "Mohinga relies heavily on catfish and lemongrass for its distinct flavor."
            },
            {
                question: "Which ingredient is absolutely essential to give Burmese Tea Leaf Salad (Lahpet Thoke) its identity?",
                options: ["Pickled Mango", "Fermented Tea Leaves", "Roasted Peanuts", "Fried Garlic"],
                correctIndex: 1,
                explanation: "Fermented tea leaves (Lahpet) are the star of this iconic dish."
            },
            {
                question: "The traditional snack 'Mont Lin Ma Yar' directly translates to what in English?",
                options: ["Couple's Snack", "Morning Pancake", "Sweet Rice Cake", "Golden Fritter"],
                correctIndex: 0,
                explanation: "It translates to 'Husband and Wife snack' because it joins two halves into one bite."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let isProcessing = false;

        const elStart = document.getElementById('startScreen');
        const elQuiz = document.getElementById('quizScreen');
        const elResult = document.getElementById('resultScreen');
        const elQuestionText = document.getElementById('questionText');
        const elOptions = document.getElementById('optionsContainer');
        const elCount = document.getElementById('questionCount');
        const elFeedback = document.getElementById('feedbackContainer');
        const elFeedbackText = document.getElementById('feedbackText');
        const elProgressBar = document.getElementById('progressBar');

        function startQuiz() {
            currentQuestion = 0;
            score = 0;
            isProcessing = false;
            
            elStart.classList.add('hidden');
            elResult.classList.add('hidden');
            elQuiz.classList.remove('hidden');
            elQuiz.classList.add('flex');
            
            loadQuestion();
        }

        function loadQuestion() {
            isProcessing = false;
            const data = quizData[currentQuestion];
            
            elCount.innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
            elQuestionText.innerText = data.question;
            
            const progressPct = (currentQuestion / quizData.length) * 100;
            elProgressBar.style.width = `${progressPct}%`;
            
            elFeedback.classList.remove('opacity-100');
            elFeedback.classList.add('opacity-0');
            
            elOptions.innerHTML = '';
            
            data.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = `option-btn w-full text-left px-5 py-4 rounded-xl bg-bgMain border border-bgSurface text-brandPrimary font-bold text-sm sm:text-base hover:border-brandPrimary hover:bg-white transition-all flex items-center justify-between group`;
                btn.innerHTML = `
                    <span>${opt}</span>
                    <i class="fa-solid fa-circle-check opacity-0 transform scale-50 transition-all duration-300 status-icon"></i>
                `;
                btn.onclick = () => selectAnswer(index, btn);
                elOptions.appendChild(btn);
            });
        }

        function selectAnswer(selectedIndex, clickedBtn) {
            if (isProcessing) return;
            isProcessing = true;
            
            const data = quizData[currentQuestion];
            const isCorrect = selectedIndex === data.correctIndex;
            
            const allBtns = elOptions.querySelectorAll('button');
            allBtns.forEach(b => b.disabled = true);

            if (isCorrect) {
                score++;
                clickedBtn.classList.remove('bg-bgMain', 'border-bgSurface', 'text-brandPrimary', 'hover:bg-white');
                clickedBtn.classList.add('bg-green-500', 'border-green-600', 'text-white', 'shadow-md', 'scale-[1.02]');
                const icon = clickedBtn.querySelector('.status-icon');
                icon.className = 'fa-solid fa-circle-check text-white opacity-100 transform scale-100 transition-all duration-300';
                
                showFeedback(true, "Correct! Great job.");
            } else {
                clickedBtn.classList.remove('bg-bgMain', 'border-bgSurface', 'text-brandPrimary', 'hover:bg-white');
                clickedBtn.classList.add('bg-red-50', 'border-red-500', 'text-red-600', 'animate-shake');
                const icon = clickedBtn.querySelector('.status-icon');
                icon.className = 'fa-solid fa-circle-xmark text-red-500 opacity-100 transform scale-100 transition-all duration-300';
                
                const correctBtn = allBtns[data.correctIndex];
                correctBtn.classList.remove('bg-bgMain', 'border-bgSurface', 'text-brandPrimary', 'hover:bg-white');
                correctBtn.classList.add('bg-green-500', 'border-green-600', 'text-white');
                const correctIcon = correctBtn.querySelector('.status-icon');
                correctIcon.className = 'fa-solid fa-circle-check text-white opacity-100 transform scale-100 transition-all duration-300';

                showFeedback(false, `Incorrect. ${data.explanation}`);
            }

            setTimeout(() => {
                currentQuestion++;
                if (currentQuestion < quizData.length) {
                    elQuiz.classList.remove('animate-fade-in');
                    void elQuiz.offsetWidth; 
                    elQuiz.classList.add('animate-fade-in');
                    loadQuestion();
                } else {
                    finishQuiz();
                }
            }, 1500);
        }

        function showFeedback(isCorrect, message) {
            elFeedbackText.innerHTML = isCorrect 
                ? `<i class="fa-solid fa-check text-green-500"></i> <span class="text-green-600">${message}</span>`
                : `<i class="fa-solid fa-xmark text-red-500"></i> <span class="text-red-600">${message}</span>`;
            
            elFeedback.classList.remove('opacity-0');
            elFeedback.classList.add('opacity-100');
        }

        function finishQuiz() {
            elProgressBar.style.width = `100%`;
            elQuiz.classList.add('hidden');
            elQuiz.classList.remove('flex');
            
            elResult.classList.remove('hidden');
            elResult.classList.add('flex');
            
            const finalScoreEl = document.getElementById('finalScore');
            const resultTitle = document.getElementById('resultTitle');
            const resultDesc = document.getElementById('resultDesc');
            const resultIcon = document.getElementById('resultIcon');

            finalScoreEl.innerText = `${score} / ${quizData.length}`;

            if (score === quizData.length) {
                resultIcon.className = 'w-24 h-24 rounded-full flex items-center justify-center text-5xl text-white shadow-xl mb-6 bg-gradient-to-br from-yellow-400 to-yellow-600';
                resultIcon.innerHTML = '<i class="fa-solid fa-trophy"></i>';
                resultTitle.innerText = "Perfect Score!";
                resultDesc.innerText = "You are a true Yangon foodie master. Excellent knowledge of authentic local cuisine.";
            } else if (score > 0) {
                resultIcon.className = 'w-24 h-24 rounded-full flex items-center justify-center text-5xl text-white shadow-xl mb-6 bg-gradient-to-br from-green-400 to-green-600';
                resultIcon.innerHTML = '<i class="fa-solid fa-star"></i>';
                resultTitle.innerText = "Great Job!";
                resultDesc.innerText = "You know your way around the menu, but there's always more delicious secrets to discover.";
            } else {
                resultIcon.className = 'w-24 h-24 rounded-full flex items-center justify-center text-5xl text-white shadow-xl mb-6 bg-gradient-to-br from-red-400 to-red-600';
                resultIcon.innerHTML = '<i class="fa-solid fa-bowl-food"></i>';
                resultTitle.innerText = "Keep Exploring!";
                resultDesc.innerText = "Time to hit the streets of Yangon and taste more of what the city has to offer!";
            }
        }

        function resetQuiz() {
            startQuiz();
        }
    </script>
</body>
</html>
